name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone name-place-faction-generator
        run: git clone https://github.com/Game-in-the-Brain/name-place-faction-generator.git ../name-place-faction-generator

      - name: Build name-place-faction-generator packages
        run: |
          cd ../name-place-faction-generator
          npm install
          npm run build -w shared
          npm run build -w packages/namegen
          npm run build -w packages/placegen
          npm run build -w packages/factiongen

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Restore lockfile
        run: git checkout -- package-lock.json

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
